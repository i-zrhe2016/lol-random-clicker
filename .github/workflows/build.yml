name: Build and Release

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release Tag（如 v1.0.0，留空则使用 build-N）'
        type: string
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install MinGW
      run: sudo apt-get install -y mingw-w64

    - name: Compile resource file
      run: x86_64-w64-mingw32-windres random_clicker.rc -o random_clicker_res.o

    - name: Compile EXE
      run: |
        x86_64-w64-mingw32-gcc random_clicker_win.c random_clicker_res.o \
          -o random_clicker.exe \
          -lgdi32 -luser32 -lmsimg32 -mwindows -mconsole

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: random_clicker_windows
        path: random_clicker.exe

    - name: Generate tag name
      id: tag
      run: |
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        elif [[ -n "${{ inputs.release_tag }}" ]]; then
          echo "name=${{ inputs.release_tag }}" >> $GITHUB_OUTPUT
        else
          echo "name=build-${{ github.run_number }}" >> $GITHUB_OUTPUT
        fi

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.name }}
        name: "Release ${{ steps.tag.outputs.name }}"
        files: random_clicker.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
